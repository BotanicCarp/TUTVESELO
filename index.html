<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Касса проката Тут Весело</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f3f5;
    padding:15px;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

button{
    width:45%;
    padding:15px;
    margin:5px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.service{
    background:#2196f3;
    color:white;
}

.price{
    background:#4caf50;
    color:white;
}

.pay{
    background:#ff9800;
    color:white;
}

.stat{
    font-size:20px;
    line-height:1.8;
}

.history{
    max-height:250px;
    overflow:auto;
}
</style>

</head>

<body>

<h1>🎿 Касса проката Тут Весело</h1>


<div class="card">

<h2>Выберите услугу</h2>

<button class="service" onclick="selectService('Машинки')">
🚗 Машинки
</button>

<button class="service" onclick="selectService('Тюбинг')">
🛷 Тюбинг
</button>

<p id="service">
Услуга не выбрана
</p>

</div>


<div class="card">

<h2>Оплата</h2>

<button class="pay" onclick="selectPay('Kaspi')">
💳 Kaspi
</button>

<button class="pay" onclick="selectPay('Наличка')">
💵 Наличка
</button>

<p id="payment">
Оплата не выбрана
</p>

</div>


<div class="card">

<h2>Сумма</h2>

<div id="buttons"></div>

</div>


<div class="card stat">

<h2>Сегодня</h2>

<p>
Всего:
<span id="total">0</span> ₸
</p>

<p>
Kaspi:
<span id="kaspi">0</span> ₸
</p>

<p>
Наличка:
<span id="cash">0</span> ₸
</p>

<p>
🚗 Машинки:
<span id="cars">0</span> ₸
</p>

<p>
🛷 Тюбинг:
<span id="tubes">0</span> ₸
</p>

</div>


<div class="card">

<h2>История</h2>

<div class="history" id="history">

</div>

</div>


<script>

let data = JSON.parse(localStorage.getItem("kassa")) || {

total:0,
kaspi:0,
cash:0,
cars:0,
tubes:0,
history:[]

};


let service="";
let payment="";


function selectService(x){

service=x;

document.getElementById("service").innerHTML=
"Выбрано: "+x;


let html="";


if(x=="Машинки"){

[500,1000,1500,2000].forEach(v=>{

html+=`
<button class="price" onclick="add(${v})">
+${v}
</button>`;

});

}

else{

[1000,2000,3000].forEach(v=>{

html+=`
<button class="price" onclick="add(${v})">
+${v}
</button>`;

});

}


document.getElementById("buttons").innerHTML=html;

}



function selectPay(x){

payment=x;

document.getElementById("payment").innerHTML=
"Выбрано: "+x;

}



function add(sum){


if(!service || !payment){

alert("Выберите услугу и оплату");

return;

}


data.total+=sum;


if(payment=="Kaspi")
data.kaspi+=sum;

else
data.cash+=sum;



if(service=="Машинки")
data.cars+=sum;

else
data.tubes+=sum;



let time=new Date().toLocaleTimeString();


data.history.unshift(
`${time} | ${service} | ${payment} | ${sum} ₸`
);


save();

}



function save(){

localStorage.setItem(
"kassa",
JSON.stringify(data)
);


document.getElementById("total").innerHTML=data.total;

document.getElementById("kaspi").innerHTML=data.kaspi;

document.getElementById("cash").innerHTML=data.cash;

document.getElementById("cars").innerHTML=data.cars;

document.getElementById("tubes").innerHTML=data.tubes;


document.getElementById("history").innerHTML=
data.history.join("<br><br>");

}


save();


</script>


</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Касса проката "Тут Весело"</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header class="header">
        <h1>🎿 Тут Весело</h1>
        <p>Касса проката</p>
    </header>

    <!-- Машинки -->
    <section class="card">

        <h2>🚗 Машинки</h2>

        <div class="buttons">

            <button class="price" data-service="Машинки" data-price="500">500 ₸</button>

            <button class="price" data-service="Машинки" data-price="1000">1000 ₸</button>

            <button class="price" data-service="Машинки" data-price="1500">1500 ₸</button>

            <button class="price" data-service="Машинки" data-price="2000">2000 ₸</button>

        </div>

    </section>

    <!-- Тюбинг -->

    <section class="card">

        <h2>🛷 Тюбинг</h2>

        <div class="buttons">

            <button class="price" data-service="Тюбинг" data-price="1000">1000 ₸</button>

            <button class="price" data-service="Тюбинг" data-price="2000">2000 ₸</button>

            <button class="price" data-service="Тюбинг" data-price="3000">3000 ₸</button>

        </div>

    </section>

    <!-- Оплата -->

    <section class="card">

        <h2>Способ оплаты</h2>

        <div class="buttons">

            <button id="kaspiBtn" class="pay active">
                💳 Kaspi
            </button>

            <button id="cashBtn" class="pay">
                💵 Наличные
            </button>

        </div>

    </section>

    <!-- Статистика -->

    <section class="card">

        <h2>Сегодня</h2>

        <div class="stats">

            <div>
                <span>Общая сумма</span>
                <strong id="total">0 ₸</strong>
            </div>

            <div>
                <span>Kaspi</span>
                <strong id="kaspi">0 ₸</strong>
            </div>

            <div>
                <span>Наличные</span>
                <strong id="cash">0 ₸</strong>
            </div>

            <div>
                <span>🚗 Машинки</span>
                <strong id="cars">0 ₸</strong>
            </div>

            <div>
                <span>🛷 Тюбинг</span>
                <strong id="tubes">0 ₸</strong>
            </div>

        </div>

    </section>

    <!-- История -->

    <section class="card">

        <h2>Последние операции</h2>

        <div id="history" class="history">

            Пока нет операций

        </div>

    </section>
    <section class="card">

    <button id="undoBtn" class="undo">
        ↩️ Отменить последнюю операцию
    </button>

</section>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
